name: Get-ARM64-Docker-Images-split

on:
  workflow_dispatch:
    inputs:
      docker_images:
        description: '请填写docker镜像名称，多个用英文逗号分开'
        required: true
        default: 'alpine:latest,alpine/curl,busybox:stable-glibc'

jobs:
  pull_and_package:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Pull Docker Images and Package
        run: |
          images="${{ github.event.inputs.docker_images }}"
          IFS=',' read -r -a image_array <<< "$images"
          for image in "${image_array[@]}"; do
            echo "Processing: $image"
            docker pull "${image}" --platform "linux/arm64"
            image_name="${image//\//_}"
            image_name="${image_name//:/_}"
            docker save "${image}" -o "${image_name}-arm64.tar"
            
            # 先压缩
            gzip -c "${image_name}-arm64.tar" > "${image_name}-arm64.tar.gz"
            rm "${image_name}-arm64.tar"
            
            # 检查文件大小，如果大于 950MB 则分割（为 1GB 限制留余量）
            file_size=$(stat -c%s "${image_name}-arm64.tar.gz")
            max_size=950000000  # 950MB，确保分割后每个文件 < 1GB
            
            if [ $file_size -gt $max_size ]; then
              echo "File size ($(($file_size/1024/1024))MB) exceeds 950MB, splitting into 900MB parts..."
              # 分割成 900MB 的分卷
              split -b 900M "${image_name}-arm64.tar.gz" "${image_name}-arm64.tar.gz.part-"
              rm "${image_name}-arm64.tar.gz"
              echo "✅ Split completed. Parts created:"
              ls -lh "${image_name}-arm64.tar.gz.part-"* 2>/dev/null || echo "No parts found"
              echo "SPLITTED=true" >> $GITHUB_ENV
            else
              echo "✅ File size ($(($file_size/1024/1024))MB) OK, no split needed"
            fi
          done

      - name: List generated files (debug step)
        run: |
          echo "=========================================="
          echo "Generated files in workspace:"
          echo "=========================================="
          find $GITHUB_WORKSPACE -name "*.tar.gz*" -type f 2>/dev/null || echo "No files found"
          echo ""
          echo "File sizes:"
          find $GITHUB_WORKSPACE -name "*.tar.gz*" -type f -exec ls -lh {} \; 2>/dev/null || echo "No files"
          echo ""
          
          # 设置 Release 名称
          release_name=$(TZ="Asia/Shanghai" date +'%Y-%m-%d %H:%M Build')
          echo "RELEASE_NAME=$release_name" >> $GITHUB_ENV
          
          # 统计文件数量
          file_count=$(find $GITHUB_WORKSPACE -name "*.tar.gz*" -type f 2>/dev/null | wc -l)
          echo "Total files to upload: $file_count"

      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@master
        with:
          tag_name: DockerTarBuilder-ARM64
          name: ${{ env.RELEASE_NAME }} for ARM64
          body: |
            [![Github](https://img.shields.io/badge/RELEASE:DockerTarBuilder-123456?logo=github&logoColor=fff&labelColor=green&style=for-the-badge)](https://www.bilibili.com/video/BV1EZ421M7mL) [![Github](https://img.shields.io/badge/国内加速站下载-FC7C0D?logo=github&logoColor=fff&labelColor=000&style=for-the-badge)](https://wkdaily.cpolar.top/archives/1)
            
            ### 📦 本次打包的镜像
            `${{ github.event.inputs.docker_images }}`
            
            ### 📦 文件说明
            - 小于 950MB 的镜像：单个 `.tar.gz` 文件
            - 大于 950MB 的镜像：分割成多个 900MB 的 `.part-*` 分卷文件
            
            ### How to use?
            
            **对于单个文件：**
            ```bash
            docker load -i 镜像名.tar.gz
