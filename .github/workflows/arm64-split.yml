name: Get-ARM64-Docker-Images-split

on:
  workflow_dispatch:
    inputs:
      docker_images:
        description: '请填写docker镜像名称，多个用英文逗号分开'
        required: true
        default: 'alpine:latest,alpine/curl,busybox:stable-glibc'

jobs:
  pull_and_package:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Pull Docker Images and Package
        run: |
          images="${{ github.event.inputs.docker_images }}"
          IFS=',' read -r -a image_array <<< "$images"
          
          for image in "${image_array[@]}"; do
            echo "=========================================="
            echo "Processing: $image"
            echo "=========================================="
            
            # 拉取镜像
            docker pull "${image}" --platform "linux/arm64"
            
            # 生成安全的文件名
            image_name="${image//\//_}"
            image_name="${image_name//:/_}"
            
            # 保存为 tar
            docker save "${image}" -o "${image_name}-arm64.tar"
            
            # 压缩
            echo "Compressing..."
            gzip -c "${image_name}-arm64.tar" > "${image_name}-arm64.tar.gz"
            
            # 获取压缩后大小
            file_size=$(stat -c%s "${image_name}-arm64.tar.gz")
            file_size_mb=$((file_size / 1024 / 1024))
            echo "Compressed size: ${file_size_mb}MB"
            
            # 删除原始 tar
            rm "${image_name}-arm64.tar"
            
            # 如果大于 900MB，分割成 800MB 的分卷
            if [ $file_size -gt 900000000 ]; then
              echo "⚠️ File too large (${file_size_mb}MB), splitting into 800MB parts..."
              
              # 分割文件
              split -b 800M "${image_name}-arm64.tar.gz" "${image_name}-arm64.tar.gz.part-"
              
              # 删除原文件
              rm "${image_name}-arm64.tar.gz"
              
              # 列出分卷
              echo "✅ Created parts:"
              ls -lh "${image_name}-arm64.tar.gz.part-"*
              
              # 标记已分割
              echo "SPLITTED=true" >> $GITHUB_ENV
            else
              echo "✅ File size OK (${file_size_mb}MB), no split needed"
            fi
            
            echo "=========================================="
          done

      - name: List and Verify All Files
        run: |
          echo "=========================================="
          echo "ALL GENERATED FILES"
          echo "=========================================="
          
          # 切换到工作目录
          cd $GITHUB_WORKSPACE
          
          # 列出所有相关文件
          find . -maxdepth 1 -name "*.tar.gz*" -type f | sort
          
          echo ""
          echo "=========================================="
          echo "FILE DETAILS"
          echo "=========================================="
          
          # 显示每个文件的大小
          for file in $(find . -maxdepth 1 -name "*.tar.gz*" -type f); do
            size=$(stat -c%s "$file")
            size_mb=$((size / 1024 / 1024))
            echo "$file - ${size_mb}MB"
          done
          
          # 设置 Release 名称
          release_name=$(TZ="Asia/Shanghai" date +'%Y-%m-%d %H:%M Build')
          echo "RELEASE_NAME=$release_name" >> $GITHUB_ENV
          
          # 统计文件数量
          file_count=$(find . -maxdepth 1 -name "*.tar.gz*" -type f | wc -l)
          echo "Total files to upload: $file_count"
          
          # 保存文件列表到环境变量
          echo "FILE_COUNT=$file_count" >> $GITHUB_ENV

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: DockerTarBuilder-ARM64
          name: ${{ env.RELEASE_NAME }} for ARM64
          body: |
            [![Github](https://img.shields.io/badge/RELEASE:DockerTarBuilder-123456?logo=github&logoColor=fff&labelColor=green&style=for-the-badge)](https://www.bilibili.com/video/BV1EZ421M7mL) [![Github](https://img.shields.io/badge/国内加速站下载-FC7C0D?logo=github&logoColor=fff&labelColor=000&style=for-the-badge)](https://wkdaily.cpolar.top/archives/1)
            
            ### 📦 本次打包的镜像
            `${{ github.event.inputs.docker_images }}`
            
            ### 📊 文件统计
            共生成 **${{ env.FILE_COUNT }}** 个文件
            
            ### 📦 文件说明
            - **小于 800MB** 的镜像：单个 `.tar.gz` 文件
            - **大于 800MB** 的镜像：分割成多个 800MB 的 `.part-*` 分卷文件
            
            ### 🚀 使用方法
            
            **对于单个文件：**
            ```bash
            docker load -i 文件名.tar.gz
